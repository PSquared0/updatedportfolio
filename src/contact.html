<!DOCTYPE html>
<html lang="en">
@@include('partials/_head.html', {
  "title": "Contact",
  "description": "Get in touch with Pascale Pierre."
})
<body>

@@include('partials/_nav.html', {"page": "contact"})

<section class="probootstrap-intro" style="background-image: url(img/hero_bg_2.jpg);" data-stellar-background-ratio="0.5">
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-7 probootstrap-intro-text">
        <h1 class="probootstrap-animate">Contact</h1>
        <div class="probootstrap-subtitle probootstrap-animate">
          <h2>Have a role, a project, or just want to connect? Reach out below.</h2>
        </div>
      </div>
    </div>
  </div>
  <a class="probootstrap-scroll-down js-next" href="#next-section">Scroll down <i class="icon-chevron-down"></i></a>
</section>

<section id="next-section" class="probootstrap-section">
  <div class="container">
    <div class="row mb60">
      <div class="col-md-8 col-md-offset-2 probootstrap-animate">
        <form name="contact" method="POST" data-netlify="true" action="/success.html">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" class="form-control" id="name" name="name">
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" class="form-control" id="email" name="email">
          </div>
          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" class="form-control" id="subject" name="subject">
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea cols="30" rows="10" class="form-control" id="message" name="message"></textarea>
          </div>
          <div class="form-group">
            <input type="submit" class="btn btn-primary" id="submit" name="submit" value="Send Message">
          </div>
          <div id="captcha" data-netlify-recaptcha="true"></div>
        </form>
      </div>
    </div>
  </div>
</section>

@@include('partials/_footer.html')

</body>
</html>
